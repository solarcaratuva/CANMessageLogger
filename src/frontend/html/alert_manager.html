<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style/styles.css">
    <title>UVA Solar Car</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</head>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">
            <div class="logo-container">
                <img src="../static/logo.png" id="logo" alt="Logo" class="navbar-logo">
            </div>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="/">Debug Dashboard<span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Graphs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Link2</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Link3</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/alert_manager">Alert Manager</a>
                </li>
            </ul>

            <div class="navbar-nav ml-auto">
                <span class="text-light middleTitle">Debug Dashboard</span>
            </div>
        </div>
    </nav>
</header>
<body>
    <div class="wide-container text-center mt-4">
        <h2>Alert Manager</h2>
    </div>
    <div class="container text-center mt-4">
        <button class="btn btn-primary" id="addAlertBtn" style="background-color: white; color: black; border: 1px solid #ccc; border-radius: 5px;">
            Add Alert
        </button>
    </div>
    
    

    <!-- Modal -->
    <div class="modal fade" id="addAlertModal" tabindex="-1" role="dialog" aria-labelledby="addAlertModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addAlertModalLabel">Add Alert</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="alertForm">
                        <div class="form-group">
                            <label for="alertType">Alert Type</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="type1" id="alertType1">
                                <label class="form-check-label" for="alertType1">
                                    Type 1
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="type2" id="alertType2">
                                <label class="form-check-label" for="alertType2">
                                    Type 2
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="type3" id="alertType3">
                                <label class="form-check-label" for="alertType3">
                                    Type 3
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveAlertBtn">Save Alert</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('addAlertBtn').addEventListener('click', function () {
    // Show the modal
    $('#addAlertModal').modal('show');

    // Fetch parsed DBC fields from the server
    fetch('/parse_dbc_fields', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
    })
        .then((response) => response.json())
        .then((data) => {
            console.log("HERES THe DATA: ", data.message);
            // Clear any existing checkboxes
            const formGroup = document.querySelector('#alertForm .form-group');
            formGroup.innerHTML = '<label for="alertType">Alert Type</label>';

            // Populate the form dynamically with checkboxes
            for (const [category, fields] of Object.entries(data.message)) {
                // Add a category label
                const categoryLabel = document.createElement('h5');
                categoryLabel.innerText = category;
                formGroup.appendChild(categoryLabel);

                // Add checkboxes for each field in the category
                for (const [fieldKey, fieldLabel] of Object.entries(fields)) {
                    console.log("Field key: ", fieldKey);
                    console.log("Field label: ", fieldLabel);
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'form-check-input';
                    checkbox.id = fieldKey;
                    checkbox.value = fieldKey;

                    const label = document.createElement('label');
                    label.className = 'form-check-label';
                    label.htmlFor = fieldKey;
                    label.innerText = fieldKey;

                    const checkboxContainer = document.createElement('div');
                    checkboxContainer.className = 'form-check';
                    checkboxContainer.appendChild(checkbox);
                    checkboxContainer.appendChild(label);

                    formGroup.appendChild(checkboxContainer);
                }
            }
        })
        .catch((error) => {
            console.error('Error fetching DBC fields:', error);
        });
});

        document.getElementById('saveAlertBtn').addEventListener('click', function() {

            const formData = {
                type1: document.getElementById('alertType1').checked,
                type2: document.getElementById('alertType2').checked,
                type3: document.getElementById('alertType3').checked,
            };
            fetch('/parse_dbc_fields', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData),
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data.message);
                $('#addAlertModal').modal('hide');
            })
            .catch(error => {
                console.error('Error:', error);
            });
                $('#addAlertModal').modal('hide');
            });
            
    </script>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="small-container">
                    <div class="text-container">
                        <h3>Alerts</h3>
                        <div class="alert-container" id="alertContainer">
                            <!-- Content for alert container will be dynamically updated -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
