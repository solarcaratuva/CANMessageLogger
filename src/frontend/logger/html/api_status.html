<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .status-card {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
        }

        .status-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .status-indicator.online {
            background: rgba(76, 175, 80, 0.2);
            border: 3px solid #4caf50;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.offline {
            background: rgba(244, 67, 54, 0.2);
            border: 3px solid #f44336;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(76, 175, 80, 0);
            }
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .status-text.online {
            color: #4caf50;
        }

        .status-text.offline {
            color: #f44336;
        }

        .timestamp {
            color: #666;
            font-size: 0.875rem;
            font-family: 'Courier New', monospace;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .info-value {
            color: #eee;
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 480px) {
            .status-card {
                padding: 2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .status-indicator {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <h1>API Status</h1>
            <p class="subtitle">Solar Car Telemetry System</p>

            <div class="status-indicator online">
                ✓
            </div>

            <div class="status-text online">
                API Online
            </div>

            <div class="timestamp" id="timestamp">
                Loading...
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Endpoint</div>
                    <div class="info-value">/api/test</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Method</div>
                    <div class="info-value">GET</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Status</div>
                    <div class="info-value">200 OK</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Version</div>
                    <div class="info-value">v1.0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTimestamp() {
            const now = new Date();
            const formatted = now.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('timestamp').textContent = formatted;
        }

        // Update timestamp immediately and every second
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
